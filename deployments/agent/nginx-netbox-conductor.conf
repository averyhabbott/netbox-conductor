# nginx site configuration for NetBox + netbox-conductor agent health checks.
#
# This is a drop-in replacement for the standard NetBox nginx config
# (contrib/nginx.conf). The only additions are the two `location = /status`
# blocks, which proxy the agent health endpoint through the reverse proxy so
# that load balancers can check /status on port 443 without needing direct
# access to the loopback-only agent port (127.0.0.1:8081).
#
# Installation (Debian/Ubuntu):
#   sudo cp nginx-netbox-conductor.conf /etc/nginx/sites-available/netbox
#   sudo ln -s /etc/nginx/sites-available/netbox /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Installation (RHEL/CentOS/Rocky):
#   sudo cp nginx-netbox-conductor.conf /etc/nginx/conf.d/netbox.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Before copying:
#   1. Replace "netbox.example.com" with your actual hostname.
#   2. Update ssl_certificate / ssl_certificate_key paths.
#   3. If you changed AGENT_STATUS_ADDR, update the proxy_pass in the
#      `location = /status` blocks accordingly.
#
# SELinux note (RHEL/CentOS/Rocky): if nginx cannot connect to 127.0.0.1:8081,
# run: sudo setsebool -P httpd_can_network_connect 1
#
# Existing NetBox nginx config: if you already have a netbox site config,
# disable it first to avoid duplicate server_name conflicts:
#   sudo rm /etc/nginx/sites-enabled/netbox   # or rename the existing file

server {
    listen [::]:443 ssl ipv6only=off;
    server_name netbox.example.com;

    ssl_certificate     /etc/ssl/certs/netbox.crt;
    ssl_certificate_key /etc/ssl/private/netbox.key;

    client_max_body_size 25m;

    # Serve NetBox static files directly
    location /static/ {
        alias /opt/netbox/netbox/static/;
    }

    # Agent health check — exact match so it never intercepts /status/ or
    # other NetBox paths that start with /status.
    # Returns 200 when netbox.service is active, 503 when stopped/degraded.
    location = /status {
        proxy_pass         http://127.0.0.1:8081/status;
        proxy_read_timeout 5s;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }

    # Proxy all other requests to NetBox (gunicorn)
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   X-Forwarded-Host  $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen [::]:80 ipv6only=off;
    server_name _;

    # Allow health checkers that probe port 80 (e.g. during certificate
    # provisioning or when TLS is terminated upstream). Returns the same
    # 200/503 as the HTTPS block without a redirect.
    location = /status {
        proxy_pass         http://127.0.0.1:8081/status;
        proxy_read_timeout 5s;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
