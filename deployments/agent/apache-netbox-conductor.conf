# Apache httpd site configuration for NetBox + netbox-conductor agent health checks.
#
# This is a drop-in replacement for the standard NetBox Apache config
# (contrib/apache.conf). The only additions are the ProxyPass directives for
# /status, which proxy the agent health endpoint through the reverse proxy so
# that load balancers can check /status on port 443 without needing direct
# access to the loopback-only agent port (127.0.0.1:8081).
#
# Installation (Debian/Ubuntu):
#   sudo a2enmod proxy proxy_http ssl rewrite headers
#   sudo cp apache-netbox-conductor.conf /etc/apache2/sites-available/netbox.conf
#   sudo a2ensite netbox
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Installation (RHEL/CentOS/Rocky):
#   sudo cp apache-netbox-conductor.conf /etc/httpd/conf.d/netbox.conf
#   sudo apachectl configtest && sudo systemctl reload httpd
#
# Before copying:
#   1. Replace "netbox.example.com" with your actual hostname.
#   2. Update SSLCertificateFile / SSLCertificateKeyFile paths.
#   3. If you changed AGENT_STATUS_ADDR, update the ProxyPass /status line.
#
# Existing NetBox Apache config: disable it first to avoid duplicate
# ServerName conflicts:
#   sudo a2dissite netbox   # or remove the existing file from conf.d/

<VirtualHost *:80>
    ServerName netbox.example.com

    # Allow health checkers that probe port 80. Returns the same 200/503 as
    # the HTTPS vhost without a redirect — load balancers may probe before
    # TLS is established.
    <Location /status>
        ProxyPass        http://127.0.0.1:8081/status
        ProxyPassReverse http://127.0.0.1:8081/status
        RequestHeader    set X-Forwarded-Proto "http"
    </Location>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/status$
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R,L]
</VirtualHost>

<VirtualHost *:443>
    ProxyPreserveHost On

    ServerName netbox.example.com

    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/netbox.crt
    SSLCertificateKeyFile /etc/ssl/private/netbox.key

    Alias /static /opt/netbox/netbox/static

    <Directory /opt/netbox/netbox/static>
        Options FollowSymLinks MultiViews
        AllowOverride None
        Require all granted
    </Directory>

    # Do not proxy static files
    <Location /static>
        ProxyPass !
    </Location>

    # Agent health check — proxy to the loopback status server.
    # Returns 200 when netbox.service is active, 503 when stopped/degraded.
    # ProxyPass must appear before the catch-all ProxyPass below.
    <Location /status>
        ProxyPass        http://127.0.0.1:8081/status
        ProxyPassReverse http://127.0.0.1:8081/status
        RequestHeader    set X-Forwarded-Proto "https"
    </Location>

    RequestHeader set "X-Forwarded-Proto" expr=%{REQUEST_SCHEME}
    ProxyPass        / http://127.0.0.1:8001/
    ProxyPassReverse / http://127.0.0.1:8001/
</VirtualHost>
