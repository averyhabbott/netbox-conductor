<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#7c3aed"/>
  <!-- Baton grip (thick end, bottom-left) to tip (thin end, upper-right) -->
